<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexaSphere — Monorepo Root</title>
    <meta name="robots" content="noindex" />
    <style>
      body {
        margin: 0;
        background: #0a0a0a;
        color: #ccc;
        font-family: 'Inter', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        flex-direction: column;
        gap: 16px;
        text-align: center;
      }
      h1 {
        color: #cc1111;
        font-size: 1.4rem;
      }
      a {
        color: #cc1111;
        padding: 10px 24px;
        border: 1px solid #cc1111;
        border-radius: 6px;
        text-decoration: none;
        transition: background 0.2s;
      }
      a:hover {
        background: rgba(204, 17, 17, 0.15);
      }
      .links {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <h1>NexaSphere Monorepo</h1>
    <p>This is the root of the monorepo. Use the workspace-specific servers:</p>
    <div class="links">
      <a href="http://localhost:5175">🌐 Website (port 5175)</a>
      <a href="http://localhost:5001">🔐 Admin Dashboard (port 5001)</a>
    </div>
    <p style="font-size: 0.8rem; opacity: 0.5; margin-top: 24px">
      Run <code>npm run dev:all</code> from the repo root to start both servers.
    </p>
  </body>
</html>
