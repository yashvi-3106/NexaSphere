<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <script src="/theme-init.js"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexaSphere — Connecting GL Bajaj Tech Ecosystem</title>
    <meta
      name="description"
      content="NexaSphere is the premier tech community of GL Bajaj Group of Institutions — connecting students through hackathons, codathons, workshops, and more."
    />
    <meta name="theme-color" content="#E63946" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple / iOS PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NexaSphere" />

    <!-- Android Chrome PWA meta tags -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/assets/logo-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/assets/logo-icon.svg" />
    <link rel="apple-touch-icon" sizes="192x192" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/pwa-512x512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=optional"
      rel="stylesheet"
    />

    <!-- API & monitoring preconnects — reduces TTFB on first API call -->
    <link rel="preconnect" href="http://localhost:8787" />
    <link rel="dns-prefetch" href="https://sentry.io" />

    <!-- Critical CSS for above-the-fold layout and preventing FOUC -->
    <style id="critical-css">
      :root {
        --bg: #0b0f19;
        --t1: #f3f4f6;
        --c1: #e63946;
      }
      [data-theme='light'] {
        --bg: #ffffff;
        --t1: #111827;
      }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }
      body {
        background-color: var(--bg);
        color: var(--t1);
        font-family: 'Rajdhani', sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial;
        font-size: 16px;
        line-height: 1.65;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }
      #root {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      /* Minimal skeleton for Navbar */
      .navbar-skeleton {
        height: 88px;
        width: 100%;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      [data-theme='light'] .navbar-skeleton {
        border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
