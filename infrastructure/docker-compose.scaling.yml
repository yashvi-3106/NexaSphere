version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: nexasphere-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - scaling

  api:
    build:
      context: ../server
    container_name: nexasphere-api-1
    env_file: ../.env
    environment:
      - PORT=8787
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scaling

  api2:
    build:
      context: ../server
    container_name: nexasphere-api-2
    env_file: ../.env
    environment:
      - PORT=8787
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scaling

  api3:
    build:
      context: ../server
    container_name: nexasphere-api-3
    env_file: ../.env
    environment:
      - PORT=8787
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scaling

  nginx:
    build: ./nginx
    container_name: nexasphere-nginx
    ports:
      - '80:80'
    depends_on:
      - api
      - api2
      - api3
    restart: unless-stopped
    networks:
      - scaling

volumes:
  redis_data:

networks:
  scaling:
    driver: bridge
