input {
  file {
    path => "/usr/share/logstash/logs/combined.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "backend"
  }
}

filter {
  if [type] == "backend" {
    # Grok pattern to parse: 2026-06-11 13:17:41 [info]: Server started on port 8787
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:log_timestamp} \[%{DATA:log_level}\]: %{GREEDYDATA:log_message}" }
    }
    
    # Parse the timestamp into Kibana @timestamp
    date {
      match => [ "log_timestamp", "yyyy-MM-dd HH:mm:ss:ms", "yyyy-MM-dd HH:mm:ss" ]
      target => "@timestamp"
      timezone => "UTC"
    }

    # Convert log level to uppercase for standardization
    mutate {
      uppercase => [ "log_level" ]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "nexasphere-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
