name: 🐛 Bug Report
description: Report a bug to help us improve NexaSphere.
title: '[BUG]: '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe what went wrong...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened instead...
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment Info
      description: Which service/component are you running?
      options:
        - Frontend (React Application)
        - Java Backend (server-java)
        - Python Forms Service (server-python)
        - Admin Dashboard
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System / Browser
      placeholder: e.g. Windows 11 / Chrome 120
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
      placeholder: Drag and drop or paste links here...
    validations:
      required: false
