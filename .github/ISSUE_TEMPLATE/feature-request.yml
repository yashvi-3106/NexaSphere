name: 🚀 Feature Request
description: Propose a new feature or enhancement for NexaSphere.
title: '[FEATURE]: '
labels: ['enhancement', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for NexaSphere? We'd love to hear it!
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is. (e.g. I'm always frustrated when...)
      placeholder: Describe the problem...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen.
      placeholder: Describe your proposed solution...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: A clear and concise description of any alternative solutions or features you've considered.
      placeholder: Any other ways this could be done...
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or screenshots about the feature request here.
      placeholder: Add any other details or files...
    validations:
      required: false
