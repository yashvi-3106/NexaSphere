name: Admin Dashboard — Auto-Label & Credentials Helper

# ─────────────────────────────────────────────────────────────────────────────
# Triggered on any PR that touches files under admin-dashboard/.
#
# Actions:
#  1. Ensures the `admin-dashboard` label exists in the repo.
#  2. Adds the `admin-dashboard` label to the PR automatically.
#  3. Posts a helpful comment with admin dashboard credentials and dev setup
#     instructions so contributors can start working immediately.
#
# Uses pull_request_target so the write token is available for fork PRs.
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'admin-dashboard/**'

jobs:
  admin-dashboard-helper:
    name: Admin Dashboard Label & Credentials
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Label PR and post credentials comment
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr     = context.payload.pull_request;
            const prNum  = pr.number;
            const author = pr.user.login;

            // ── 1. Ensure the admin-dashboard label exists ───────────────────
            const adminLabel = {
              name: 'admin-dashboard',
              color: '0052cc',
              description: 'Issues/PRs related to the Admin Dashboard portal',
            };
            try {
              await github.rest.issues.getLabel({ owner, repo, name: adminLabel.name });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({ owner, repo, ...adminLabel });
                console.log(`✅ Created label: ${adminLabel.name}`);
              }
            }

            // ── 2. Apply admin-dashboard label ───────────────────────────────
            const { data: existing } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNum,
            });
            const hasLabel = existing.some(l => l.name === 'admin-dashboard');
            if (!hasLabel) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: prNum, labels: ['admin-dashboard'],
              });
              console.log(`🏷️  Applied 'admin-dashboard' label to PR #${prNum}`);
            }

            // ── 3. Check if we already posted the credentials comment ────────
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNum,
            });
            const alreadyPosted = comments.some(
              c => c.user.login === 'github-actions[bot]' &&
                   c.body.includes('Admin Dashboard — Dev Credentials')
            );
            if (alreadyPosted) {
              console.log('ℹ️  Credentials comment already posted — skipping.');
              return;
            }

            // ── 4. Post the credentials & setup comment ───────────────────────
            await github.rest.issues.createComment({
              owner, repo, issue_number: prNum,
              body: [
                `## 🛠️ Admin Dashboard — Dev Credentials`,
                ``,
                `Hi @${author}! Your PR modifies the **Admin Dashboard** — here are the credentials and setup instructions to run it locally.`,
                ``,
                `### 🔑 Login Credentials`,
                ``,
                `| Field    | Value                           |`,
                `|----------|---------------------------------|`,
                `| 📧 Email    | \`nexasphere@glbajajgroup.org\` |`,
                `| 🔒 Password | \`admin@123\`                   |`,
                ``,
                `> ⚠️ These are **development-only** credentials. Never use these in production.`,
                ``,
                `### 🚀 Local Dev Setup`,
                ``,
                `\`\`\`bash`,
                `# 1. Install dependencies from the repo root`,
                `npm install`,
                ``,
                `# 2. Start the admin dashboard dev server`,
                `npm run dev --workspace=admin-dashboard`,
                `# or`,
                `cd admin-dashboard && npm run dev`,
                `\`\`\``,
                ``,
                `The dashboard will be available at **http://localhost:5174** (or the next available port).`,
                ``,
                `### 📁 Key Files`,
                ``,
                `| File | Purpose |`,
                `|------|---------|`,
                `| \`admin-dashboard/src/pages/\` | All page components |`,
                `| \`admin-dashboard/src/components/\` | Reusable UI components |`,
                `| \`admin-dashboard/src/services/\` | API service layer |`,
                `| \`admin-dashboard/src/auth.js\` | Auth logic & token storage |`,
                `| \`admin-dashboard/.env.example\` | Required environment variables |`,
                ``,
                `### ✅ Checklist before merging`,
                ``,
                `- [ ] Tested with the credentials above in a fresh login`,
                `- [ ] Dark mode looks correct`,
                `- [ ] No console errors`,
                `- [ ] Mobile responsive`,
                ``,
                `_Auto-posted by the Admin Dashboard Helper workflow · Mentor: [@Ayushh-Sharmaa](https://github.com/Ayushh-Sharmaa)_`,
              ].join('\n'),
            });
            console.log(`💬 Credentials comment posted on PR #${prNum}`);
