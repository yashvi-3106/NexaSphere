name: GSSoC — Bootstrap All Labels

# Runs on every issue or PR open so labels always exist before any other
# workflow tries to apply them. Also manually triggerable.
on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]
  workflow_dispatch:

jobs:
  bootstrap-labels:
    name: Ensure All GSSoC Labels Exist
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Create / verify all GSSoC labels
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;

            const ALL_LABELS = [
              // ── Difficulty ──────────────────────────────────────────────────────
              { name: 'level:beginner',      color: '0075ca', description: 'GSSoC: Beginner level contribution (10 pts)' },
              { name: 'level:intermediate',  color: 'e4e669', description: 'GSSoC: Intermediate level contribution (25 pts)' },
              { name: 'level:advanced',      color: 'e11d48', description: 'GSSoC: Advanced level contribution (45 pts)' },
              { name: 'level:critical',      color: '7c3aed', description: 'GSSoC: Critical level contribution (60 pts)' },

              // ── Quality ─────────────────────────────────────────────────────────
              { name: 'quality:clean',       color: '22c55e', description: 'GSSoC: Clean, well-written code' },
              { name: 'quality:exceptional', color: 'f59e0b', description: 'GSSoC: Exceptional quality (+bonus pts)' },

              // ── Type ────────────────────────────────────────────────────────────
              { name: 'type:docs',           color: '0ea5e9', description: 'GSSoC: Documentation contribution' },
              { name: 'type:testing',        color: '0ea5e9', description: 'GSSoC: Testing contribution' },
              { name: 'type:accessibility',  color: '0ea5e9', description: 'GSSoC: Accessibility improvement' },
              { name: 'type:performance',    color: '0ea5e9', description: 'GSSoC: Performance improvement' },
              { name: 'type:security',       color: 'b91c1c', description: 'GSSoC: Security-related contribution' },
              { name: 'type:design',         color: 'a855f7', description: 'GSSoC: Design / UI contribution' },
              { name: 'type:refactor',       color: '64748b', description: 'GSSoC: Code refactoring' },
              { name: 'type:devops',         color: 'f97316', description: 'GSSoC: DevOps / CI-CD contribution' },
              { name: 'type:bug',            color: 'd73a4a', description: 'GSSoC: Bug fix' },
              { name: 'type:feature',        color: '84cc16', description: 'GSSoC: New feature' },

              // ── Validation ──────────────────────────────────────────────────────
              { name: 'gssoc:approved',      color: '0e8a16', description: 'GSSoC: Approved and scored contribution' },
              { name: 'gssoc:invalid',       color: 'ee0701', description: 'GSSoC: Invalid contribution' },
              { name: 'gssoc:spam',          color: 'ee0701', description: 'GSSoC: Spam contribution' },
              { name: 'gssoc:ai-slop',       color: 'b60205', description: 'GSSoC: AI-generated low-quality contribution' },

              // ── Mentor attribution ───────────────────────────────────────────────
              { name: 'mentor:Ayushh-Sharmaa', color: '6f42c1', description: 'GSSoC: Mentor attribution for @Ayushh-Sharmaa' },

              // ── Program tag ─────────────────────────────────────────────────────
              { name: "GSSoC'26",            color: '0e8a16', description: "Part of GirlScript Summer of Code 2026" },
            ];

            let created = 0;
            let existing = 0;

            for (const label of ALL_LABELS) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
                existing++;
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({ owner, repo, ...label });
                  console.log(`✅ Created: ${label.name}`);
                  created++;
                } else {
                  console.error(`⚠️  Error checking label "${label.name}": ${e.message}`);
                }
              }
            }

            console.log(`\n📋 Label bootstrap complete — ${created} created, ${existing} already existed.`);
