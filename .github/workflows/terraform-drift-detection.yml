name: Terraform Drift Detection

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

env:
  TF_VERSION: '1.8.5'

jobs:
  drift:
    name: Detect Drift
    strategy:
      matrix:
        environment: [dev, staging, production]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - uses: actions/checkout@v7

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init
          terraform workspace select ${{ matrix.environment }} || terraform workspace new ${{ matrix.environment }}

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -detailed-exitcode > plan.txt
        continue-on-error: true
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Create Drift Issue
        if: steps.plan.outputs.exitcode == 2
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ github.workspace }}/infra/terraform/plan.txt', 'utf8');
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Drift] Terraform drift detected in ${{ matrix.environment }}`,
              body: `## Drift Detected in \`${{ matrix.environment }}\`\n\nTerraform plan shows changes from the expected state.\n\n\`\`\`\n${planOutput.slice(0, 50000)}\n\`\`\`\n\n**Action Required**: Review and apply the plan to resolve drift.`,
              labels: ['devops', 'drift']
            });
