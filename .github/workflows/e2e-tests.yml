name: E2E Tests

on:
  schedule:
    - cron: '0 2 * * *'
  pull_request:
    paths:
      - 'website/**'
      - 'server/**'
      - 'e2e/**'
      - 'playwright.config.ts'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  E2E_BASE_URL: 'http://localhost:5175'
  E2E_API_BASE: 'http://localhost:8080'

jobs:
  e2e-tests:
    name: E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexasphere
          POSTGRES_PASSWORD: nexasphere
          POSTGRES_DB: nexasphere_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install ${{ matrix.browser }} --with-deps

      - name: Set up test environment
        run: |
          cp .env.example .env 2>/dev/null || true
          cp website/.env.example website/.env 2>/dev/null || true
          echo "DATABASE_URL=postgresql://nexasphere:nexasphere@localhost:5432/nexasphere_test" >> .env
          echo "E2E_API_BASE=http://localhost:8080" >> .env
          echo "VITE_API_BASE=http://localhost:8080" >> website/.env

      - name: Start server
        run: |
          cd server
          npm install
          node index.js &
          echo "SERVER_PID=$!"
          cd ..
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://nexasphere:nexasphere@localhost:5432/nexasphere_test
          PORT: 8080
          CORS_ORIGIN: http://localhost:5175
          ADMIN_EVENT_PASSWORD: StrongEventPassword123!
        timeout-minutes: 2

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:8080/api/health && break
            sleep 2
          done

      - name: Run E2E tests (${{ matrix.browser }})
        run: npx playwright test --project=${{ matrix.browser }}
        timeout-minutes: 20
        env:
          PWTEST_HEADLESS: true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-test-results-${{ matrix.browser }}
          path: |
            e2e/test-results/
            test-results/
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-html-report-${{ matrix.browser }}
          path: e2e/test-results/report/
          retention-days: 7

      - name: Check pass rate
        if: always()
        run: |
          if [ -f "e2e/test-results/results.json" ]; then
            TOTAL=$(jq '.stats.expected' e2e/test-results/results.json)
            FAILURES=$(jq '.stats.unexpected' e2e/test-results/results.json)
            RATE=$(echo "scale=2; ($TOTAL - $FAILURES) * 100 / $TOTAL" | bc)
            echo "Pass rate: ${RATE}%"
            if (( $(echo "$RATE < 95" | bc -l) )); then
              echo "Pass rate below 95% threshold!"
              exit 1
            fi
          fi
