# GitHub Actions workflow to build and deploy frontend assets to CDN (S3 + CloudFront)
name: Deploy Frontend to CDN

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - '.github/workflows/deploy-cdn.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy static assets to S3 and CloudFront CDN
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build client website
        run: npm run build --workspace=website
        env:
          VITE_CDN_URL: ${{ secrets.VITE_CDN_URL }}
          NODE_ENV: production

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync immutable hashed assets to S3
        run: |
          aws s3 sync website/dist/assets s3://${{ secrets.S3_BUCKET }}/assets \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync mutable HTML and entrypoint files to S3
        run: |
          aws s3 sync website/dist s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --exclude "assets/*" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront distribution cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
