# GitHub Actions workflow to build and deploy frontend assets to CDN (S3 + CloudFront)
name: Deploy Frontend to CDN

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - '.github/workflows/deploy-cdn.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy static assets to S3 and CloudFront CDN
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Upgrade npm to v11 (matches lockfile generator)
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build client website
        run: npm run build --workspace=website
        env:
          VITE_CDN_URL: ${{ secrets.VITE_CDN_URL }}
          NODE_ENV: production

      - name: Configure AWS credentials
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync immutable hashed assets to S3
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        run: |
          aws s3 sync website/dist/assets s3://${{ env.S3_BUCKET }}/assets \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Sync mutable HTML and entrypoint files to S3
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        run: |
          aws s3 sync website/dist s3://${{ env.S3_BUCKET }} \
            --delete \
            --exclude "assets/*" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront distribution cache
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
