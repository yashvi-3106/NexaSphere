# CI/CD Build and Test Workflow
name: CI – Build & Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier Check
        run: npm run format:check

  website:
    name: Website – Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Upgrade npm to v11 (matches lockfile generator)
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build (production)
        run: npm run build --workspace=website
        env:
          NODE_ENV: production
          VITE_API_BASE: ''

      - name: Create .nojekyll
        run: touch website/dist/.nojekyll

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: website-dist
          path: website/dist/
          retention-days: 3

  # ── Admin Dashboard ──────────────────────────────────────────────────────
  admin-dashboard:
    name: Admin Dashboard – Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Upgrade npm to v11 (matches lockfile generator)
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run unit tests
        run: npm run test --workspace=admin-dashboard
        env:
          NODE_ENV: test

      - name: Build (production)
        run: npm run build --workspace=admin-dashboard
        env:
          NODE_ENV: production

  # ── Server (Express API) install & smoke test ──────────────────────────
  server:
    name: Server – Install & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Upgrade npm to v11 (matches lockfile generator)
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run SQL Injection security audit
        run: npm run audit:sql

      - name: Run dependency security scan
        run: npm audit --audit-level=high

      - name: Run unit tests
        run: npm test
        env:
          NODE_ENV: test
          ADMIN_USERNAME: test-admin
          ADMIN_PASSWORD: 'Ci_test_password_stub1!'
          ADMIN_EVENT_PASSWORD: 'Ci_test_event_password_stub1!'
          PORT: 8787
          CORS_ORIGIN: 'http://localhost,http://127.0.0.1'

  report:
    name: CI Summary Report
    runs-on: ubuntu-latest

    needs:
      - lint
      - website
      - admin-dashboard
      - server

    if: always() && github.event_name == 'pull_request'

    permissions:
      pull-requests: write

    steps:
      - name: Post PR Summary
        uses: actions/github-script@v9
        with:
          script: |
            const results = {
              lint:           '${{ needs.lint.result }}',
              website:        '${{ needs.website.result }}',
              adminDashboard: '${{ needs.admin-dashboard.result }}',
              server:         '${{ needs.server.result }}',
            };

            const icon = (r) =>
              r === 'success' ? '✅' :
              r === 'skipped' ? '⏭️' : '❌';

            const rows = [
              `| Job | Result |`,
              `|-----|--------|`,
              `| Lint & Format | ${icon(results.lint)} ${results.lint} |`,
              `| Website Build | ${icon(results.website)} ${results.website} |`,
              `| Admin Dashboard | ${icon(results.adminDashboard)} ${results.adminDashboard} |`,
              `| Server Tests | ${icon(results.server)} ${results.server} |`,
            ].join('\n');

            const allPassed = Object.values(results).every(r => r === 'success');
            const summary = allPassed
              ? '✅ All checks passed!'
              : '❌ One or more jobs failed. Please review the logs.';

            const body = `## CI Summary\n\n${rows}\n\n${summary}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
