# CI/CD Build and Test Workflow
name: CI — Build & Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier Check
        run: npm run format:check

  website:
    name: Website — Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Upgrade npm to v11 (matches lockfile generator)
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build (production)
        run: npm run build --workspace=website
        env:
          NODE_ENV: production
          VITE_API_BASE: ''

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: website/dist/
          retention-days: 3

  # ── Admin Dashboard ───────────────────────────────────────────────────────
  admin-dashboard:
    name: Admin Dashboard — Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Upgrade npm to v11 (matches lockfile generator)
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run unit tests
        run: npm run test --workspace=admin-dashboard
        env:
          NODE_ENV: test

      - name: Build (production)
        run: npm run build --workspace=admin-dashboard
        env:
          NODE_ENV: production

  # ── Server (Express API) install & smoke test ─────────────────────────────
  server:
    name: Server — Install & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Upgrade npm to v11 (matches lockfile generator)
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run SQL Injection security audit
        run: npm run audit:sql

      - name: Run dependency security scan
        run: npm audit --audit-level=high

      - name: Run unit tests
        run: npm test
        env:
          NODE_ENV: test
          # Provide stub env vars so server startup helpers don't crash
          ADMIN_USERNAME: test-admin
          ADMIN_PASSWORD: TestPass123!ABC
          ADMIN_EVENT_PASSWORD: EventPass123!XYZ
          PORT: 8787
  report:
    name: CI Summary Report
    runs-on: ubuntu-latest

    needs:
      - lint
      - website
      - admin-dashboard
      - server

    if: always() && github.event_name == 'pull_request'
    
    permissions:
      pull-requests: write

    steps:
      - name: Post PR Summary
        uses: actions/github-script@v9
        with:
          script: |
            const body = `
            ## CI Pipeline Results

            ✅ Lint passed
            ✅ Website build passed
            ✅ Admin dashboard tests passed
            ✅ Server tests passed

            CI pipeline completed successfully.
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });