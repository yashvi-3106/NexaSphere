name: CI — Build & Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ── Frontend (website) build ──────────────────────────────────────────────
  website:
    name: Website — Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build (production)
        run: npm run build --workspace=website
        env:
          NODE_ENV: production
          VITE_API_BASE: ''

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: website-dist
          path: website/dist/
          retention-days: 3

  # ── Admin Dashboard build ─────────────────────────────────────────────────
  admin-dashboard:
    name: Admin Dashboard — Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build (production)
        run: npm run build --workspace=admin-dashboard
        env:
          NODE_ENV: production

  # ── Server (Express API) install & smoke test ─────────────────────────────
  server:
    name: Server — Install & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run unit tests
        run: npm test --workspace=server
        env:
          NODE_ENV: test
          # Provide stub env vars so server startup helpers don't crash
          ADMIN_USERNAME: test-admin
          ADMIN_PASSWORD: TestPass123!ABC
          ADMIN_EVENT_PASSWORD: EventPass123!XYZ
          PORT: 8787
