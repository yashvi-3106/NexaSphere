name: Database Migrations CI

on:
  pull_request:
    paths:
      - 'server/migrations/**'
      - 'server-java/src/main/resources/db/migration/**'
      - 'server-python/alembic/versions/**'
      - 'server/package.json'
      - 'server-java/pom.xml'
      - 'server-python/requirements.txt'
      - '.github/workflows/db-migrations-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'server/migrations/**'
      - 'server-java/src/main/resources/db/migration/**'
      - 'server-python/alembic/versions/**'

jobs:
  validate-nodejs-migrations:
    name: Validate Node.js Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexasphere_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package.json

      - name: Install dependencies
        working-directory: server
        run: npm install

      - name: Run migrations
        working-directory: server
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/nexasphere_test
        run: npm run migrate:latest

      - name: Verify schema
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/nexasphere_test
        run: |
          npm --prefix server run migrate -- --version
          psql $DATABASE_URL -c "SELECT count(*) as migration_count FROM pgmigrations;"
          psql $DATABASE_URL -c "SELECT tablename FROM pg_tables WHERE schemaname='public' ORDER BY tablename;"

      - name: Test rollback
        working-directory: server
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/nexasphere_test
        run: |
          npm run migrate:rollback
          echo "Migration rollback successful"

  validate-java-migrations:
    name: Validate Java Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexasphere_test_java
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Validate migration files
        working-directory: server-java
        run: |
          echo "Checking Flyway migration files..."
          ls -la src/main/resources/db/migration/
          for file in src/main/resources/db/migration/V*.sql; do
            if [ -f "$file" ]; then
              echo "✓ Found: $file"
              head -5 "$file"
            fi
          done

      - name: Check Maven build
        working-directory: server-java
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/nexasphere_test_java
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
        run: mvn clean validate

      - name: Verify Flyway configuration
        run: |
          grep -A 10 "<artifactId>flyway" server-java/pom.xml

  validate-python-migrations:
    name: Validate Python Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexasphere_test_py
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: server-python/requirements.txt

      - name: Install dependencies
        working-directory: server-python
        run: pip install -r requirements.txt

      - name: Check migration files
        working-directory: server-python
        run: |
          echo "Checking Alembic migration files..."
          ls -la alembic/versions/
          python -m py_compile alembic/versions/*.py

      - name: Validate Alembic configuration
        working-directory: server-python
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nexasphere_test_py
        run: |
          echo "Checking Alembic current version..."
          alembic current || true
          echo "Generating SQL for pending migrations..."
          alembic upgrade head --sql --autogenerate 2>/dev/null | head -50 || true

      - name: Test migration dry-run
        working-directory: server-python
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nexasphere_test_py
        run: |
          # Initialize DB schema if needed
          python -c "from sqlalchemy import create_engine; create_engine('${{ env.DATABASE_URL }}').connect()"
          echo "Database connection successful"

  check-migration-documentation:
    name: Check Migration Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify DATABASE_MIGRATIONS.md exists
        run: |
          if [ -f DATABASE_MIGRATIONS.md ]; then
            echo "✓ DATABASE_MIGRATIONS.md found at root"
            wc -l DATABASE_MIGRATIONS.md
          elif [ -f docs/DATABASE_MIGRATIONS.md ]; then
            echo "✓ DATABASE_MIGRATIONS.md found in docs/"
            wc -l docs/DATABASE_MIGRATIONS.md
          else
            echo "❌ DATABASE_MIGRATIONS.md not found"
            exit 1
          fi

      - name: Verify migration directories exist
        run: |
          echo "Checking Node.js migrations..."
          [ -d "server/migrations" ] && echo "✓ server/migrations exists" || echo "❌ server/migrations missing"

          echo "Checking Java migrations..."
          [ -d "server-java/src/main/resources/db/migration" ] && echo "✓ Java migration dir exists" || echo "❌ Java migration dir missing"

          echo "Checking Python migrations..."
          [ -d "server-python/alembic/versions" ] && echo "✓ Python migration dir exists" || echo "❌ Python migration dir missing"

      - name: Verify configuration files
        run: |
          echo "Checking Node.js migration config..."
          [ -f "server/.postgres_migrations_config.json" ] && echo "✓ Found" || echo "⚠ Missing"

          echo "Checking Java pom.xml has Flyway..."
          grep -q "flyway" server-java/pom.xml && echo "✓ Flyway configured" || echo "❌ Flyway not found"

          echo "Checking Python alembic.ini..."
          [ -f "server-python/alembic.ini" ] && echo "✓ Found" || echo "❌ Missing"

  summary:
    name: Migration Validation Summary
    runs-on: ubuntu-latest
    needs:
      - validate-nodejs-migrations
      - validate-java-migrations
      - validate-python-migrations
      - check-migration-documentation
    if: always()
    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.validate-nodejs-migrations.result }}" == "failure" ] || \
             [ "${{ needs.validate-java-migrations.result }}" == "failure" ] || \
             [ "${{ needs.validate-python-migrations.result }}" == "failure" ] || \
             [ "${{ needs.check-migration-documentation.result }}" == "failure" ]; then
            echo "❌ One or more migration validation checks failed"
            exit 1
          fi
          echo "✅ All migration validation checks passed"
