name: Security Vulnerability Scanning

on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']
  schedule:
    - cron: '30 1 * * *' # Run daily at 01:30 AM

jobs:
  dependency-scan:
    name: NPM Audit Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Upgrade npm to v11 (matches lockfile generator)
        run: npm install -g npm@11
      - name: Install dependencies and audit
        run: |
          npm install --legacy-peer-deps || echo "Proceeding to audit"
          npm audit --audit-level=high

  codeql-sast:
    name: CodeQL SAST Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript'

  secret-scan:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --only-verified

  container-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Docker image from server/Dockerfile
        run: |
          if [ -f server/Dockerfile ]; then
            docker build --pull -t nexasphere:${{ github.sha }} ./server
          else
            echo "No Dockerfile found in server/ — skipping build"
            docker pull alpine:latest
            docker tag alpine:latest nexasphere:${{ github.sha }}
          fi
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'nexasphere:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  iac-scan:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Test infrastructure with Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform,cloudformation
          skip_check: CKV_DOCKER_1,CKV_AWS_1
