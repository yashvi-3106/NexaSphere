name: Production Deployment

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  build:
    name: Build Applications
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Website
        run: npm run build --workspace=website

      - name: Build Admin Dashboard
        run: npm run build --workspace=admin-dashboard

  notify-start:
    name: Notify Slack Start
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Send Start Notification
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            --data "{\"text\":\"Production deployment started. Triggered by: ${{ github.actor }}\"}"

  deploy-backend:
    name: Deploy Backend to Render
    needs:
      - build
      - notify-start
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Trigger Render Production Deploy
        uses: johnbeynon/render-deploy-action@v0.0.9
        with:
          service-id: ${{ secrets.RENDER_PRODUCTION_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}

  deploy-frontend:
    name: Deploy Frontend to Vercel Production
    needs:
      - build
      - notify-start
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Vercel Production
        uses: amondnet/vercel-action@16e87c0a08142b0d0d33b76aeaf20823c381b9b9 # v25 — v42 does not exist
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-args: '--prod'

  smoke-test:
    name: Production Smoke Test
    needs:
      - deploy-backend
      - deploy-frontend
    runs-on: ubuntu-latest

    steps:
      - name: Check Backend Health
        run: |
          curl -f https://nexasphere-api.onrender.com/health

  create-release:
    name: Create GitHub Release
    needs: smoke-test
    runs-on: ubuntu-latest

    steps:
      - name: Create Release Tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: production-${{ github.run_number }}
          name: Production Release ${{ github.run_number }}
          generate_release_notes: true

  notify-success:
    name: Notify Slack Success
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - name: Send Slack Notification
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            --data "{\"text\":\"Production deployment successful. Release: production-${{ github.run_number }}. Triggered by: ${{ github.actor }}\"}"

  notify-failure:
    name: Notify Slack Failure
    needs: [deploy-backend, deploy-frontend, smoke-test]
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Send Failure Notification
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            --data "{\"text\":\"Production deployment failed. Workflow: ${{ github.workflow }}. Triggered by: ${{ github.actor }}\"}"
