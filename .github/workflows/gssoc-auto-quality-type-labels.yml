name: GSSoC — Auto Code Quality & Type Labels

# ─────────────────────────────────────────────────────────────────────────────
# Automatically assigns:
#   • type:*      — based on PR title keywords, file paths, and PR body
#   • quality:*   — based on code hygiene heuristics (tests, docs, size)
#
# Runs on:
#   • PR opened, reopened, edited, synchronize (new commits pushed)
# ─────────────────────────────────────────────────────────────────────────────
on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize]

jobs:
  auto-quality-type:
    name: Auto Code Quality & Type Labelling
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.user.login != 'github-actions[bot]' &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Detect and apply quality + type labels
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr     = context.payload.pull_request;
            const prNum  = pr.number;
            const title  = (pr.title || '').toLowerCase();
            const body   = (pr.body  || '').toLowerCase();
            const author = pr.user.login;

            // ── Ensure all quality/type labels exist ─────────────────────────
            const LABELS_TO_ENSURE = [
              { name: 'quality:clean',        color: '22c55e', description: 'GSSoC: Clean, well-written code' },
              { name: 'quality:exceptional',  color: 'f59e0b', description: 'GSSoC: Exceptional quality (+bonus pts)' },
              { name: 'type:bug',             color: 'd73a4a', description: 'GSSoC: Bug fix' },
              { name: 'type:feature',         color: '84cc16', description: 'GSSoC: New feature' },
              { name: 'type:docs',            color: '0ea5e9', description: 'GSSoC: Documentation contribution' },
              { name: 'type:testing',         color: '0ea5e9', description: 'GSSoC: Testing contribution' },
              { name: 'type:accessibility',   color: '0ea5e9', description: 'GSSoC: Accessibility improvement' },
              { name: 'type:performance',     color: '0ea5e9', description: 'GSSoC: Performance improvement' },
              { name: 'type:security',        color: 'b91c1c', description: 'GSSoC: Security-related contribution' },
              { name: 'type:design',          color: 'a855f7', description: 'GSSoC: Design / UI contribution' },
              { name: 'type:refactor',        color: '64748b', description: 'GSSoC: Code refactoring' },
              { name: 'type:devops',          color: 'f97316', description: 'GSSoC: DevOps / CI-CD contribution' },
            ];

            for (const lbl of LABELS_TO_ENSURE) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: lbl.name });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({ owner, repo, ...lbl });
                  console.log(`✅ Created label: ${lbl.name}`);
                }
              }
            }

            // ── Get changed files ────────────────────────────────────────────
            let changedFiles = [];
            try {
              const { data: files } = await github.rest.pulls.listFiles({
                owner, repo, pull_number: prNum, per_page: 100,
              });
              changedFiles = files.map(f => f.filename.toLowerCase());
            } catch (e) {
              console.log(`⚠️  Could not fetch changed files: ${e.message}`);
            }

            const filePaths = changedFiles.join('\n');

            // ── TYPE detection rules ─────────────────────────────────────────
            const typeRules = [
              {
                label: 'type:bug',
                match: () =>
                  /\b(fix|bug|patch|hotfix|error|crash|broken|issue|defect)\b/.test(title) ||
                  body.includes('fixes #') || body.includes('fix #') ||
                  body.includes('closes #') && /bug|fix|error/.test(body),
              },
              {
                label: 'type:feature',
                match: () =>
                  /\b(feat|feature|add|new|implement|create|introduce|build)\b/.test(title) &&
                  !/fix|bug/.test(title),
              },
              {
                label: 'type:docs',
                match: () =>
                  /\b(doc|docs|documentation|readme|guide|wiki|changelog|contributing)\b/.test(title) ||
                  /\.(md|mdx|rst|txt)$/.test(filePaths) ||
                  changedFiles.some(f => f.includes('readme') || f.includes('docs/') || f.includes('/doc/')),
              },
              {
                label: 'type:testing',
                match: () =>
                  /\b(test|tests|testing|spec|specs|e2e|unit|integration)\b/.test(title) ||
                  changedFiles.some(f =>
                    f.includes('.test.') || f.includes('.spec.') ||
                    f.includes('/test/') || f.includes('/tests/') ||
                    f.includes('/spec/') || f.endsWith('test.java') ||
                    f.includes('__tests__')
                  ),
              },
              {
                label: 'type:accessibility',
                match: () =>
                  /\b(a11y|accessibility|aria|wcag|screen.?reader|alt.?text|keyboard.?nav)\b/.test(title) ||
                  /\b(a11y|accessibility|aria|wcag)\b/.test(body),
              },
              {
                label: 'type:performance',
                match: () =>
                  /\b(perf|performance|speed|optimize|optimise|lazy.?load|cache|caching|bundle.?size)\b/.test(title) ||
                  /\b(performance|optimize|caching|memo|usememo|lazy)\b/.test(body),
              },
              {
                label: 'type:security',
                match: () =>
                  /\b(security|auth|authz|authn|cve|xss|csrf|sqli|injection|vuln|sanitiz|escape)\b/.test(title) ||
                  changedFiles.some(f => f.includes('security') || f.includes('auth') || f.includes('sanitiz')),
              },
              {
                label: 'type:design',
                match: () =>
                  /\b(ui|ux|design|style|css|scss|sass|theme|layout|responsive|visual|figma|brand)\b/.test(title) ||
                  changedFiles.some(f =>
                    f.endsWith('.css') || f.endsWith('.scss') || f.endsWith('.sass') ||
                    f.includes('/styles/') || f.includes('/theme/')
                  ),
              },
              {
                label: 'type:refactor',
                match: () =>
                  /\b(refactor|refact|cleanup|clean.?up|restructure|reorganize|rename|extract|simplify)\b/.test(title),
              },
              {
                label: 'type:devops',
                match: () =>
                  /\b(ci|cd|deploy|docker|k8s|kubernetes|github.?action|workflow|pipeline|infra|devops|helm|terraform)\b/.test(title) ||
                  changedFiles.some(f =>
                    f.startsWith('.github/') || f.includes('dockerfile') ||
                    f.includes('docker-compose') || f.endsWith('.yml') && f.includes('workflow')
                  ),
              },
            ];

            // ── QUALITY detection rules ──────────────────────────────────────
            const additions    = pr.additions    || 0;
            const deletions    = pr.deletions    || 0;
            const numFiles     = pr.changed_files || 0;
            const totalChanges = additions + deletions;

            const hasTests    = changedFiles.some(f =>
              f.includes('.test.') || f.includes('.spec.') ||
              f.includes('/test/') || f.includes('/tests/') ||
              f.endsWith('test.java') || f.includes('__tests__')
            );
            const hasDocs     = changedFiles.some(f => f.endsWith('.md') || f.includes('readme'));
            const hasTypes    = changedFiles.some(f => f.endsWith('.d.ts') || f.includes('types/'));
            const smallPR     = totalChanges < 200 && numFiles <= 5;
            const hasBodyDetail = (pr.body || '').length > 200;

            // quality:exceptional — goes above and beyond
            const isExceptional =
              hasTests && hasDocs && hasBodyDetail && totalChanges > 50 && totalChanges < 1000;

            // quality:clean — well-structured small PR
            const isClean =
              smallPR && hasBodyDetail &&
              !body.includes('wip') && !body.includes('work in progress') &&
              !title.includes('wip');

            // ── Get current PR labels ────────────────────────────────────────
            const { data: existing } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNum,
            });
            const haveLabels = new Set(existing.map(l => l.name));

            const toAdd = [];

            // Apply matching type labels
            for (const rule of typeRules) {
              if (!haveLabels.has(rule.label) && rule.match()) {
                toAdd.push(rule.label);
              }
            }

            // If no type label detected and none already present, add type:feature as fallback
            const hasAnyType = [...haveLabels].some(n => n.startsWith('type:')) ||
                               toAdd.some(n => n.startsWith('type:'));
            if (!hasAnyType) {
              toAdd.push('type:feature');
              console.log('ℹ️  No type detected — defaulting to type:feature');
            }

            // Apply quality labels
            if (isExceptional && !haveLabels.has('quality:exceptional')) {
              toAdd.push('quality:exceptional');
            } else if (isClean && !haveLabels.has('quality:clean') && !haveLabels.has('quality:exceptional')) {
              toAdd.push('quality:clean');
            }

            if (toAdd.length > 0) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: prNum, labels: toAdd });
              console.log(`🏷️  Applied labels to PR #${prNum}: ${toAdd.join(', ')}`);
            } else {
              console.log(`ℹ️  No new labels needed for PR #${prNum}`);
            }

            // ── Post a label summary comment (only on first open) ─────────────
            if (context.payload.action === 'opened' && toAdd.length > 0) {
              const typeLabelsApplied    = toAdd.filter(l => l.startsWith('type:'));
              const qualityLabelsApplied = toAdd.filter(l => l.startsWith('quality:'));

              const qualityPointsBonus = qualityLabelsApplied.includes('quality:exceptional') ? '+5 bonus pts' :
                                         qualityLabelsApplied.includes('quality:clean')       ? '+0 pts (good work!)' : '';

              const rows = [];
              if (typeLabelsApplied.length > 0) {
                rows.push(`| 📂 Type | ${typeLabelsApplied.map(l => `\`${l}\``).join(', ')} |`);
              }
              if (qualityLabelsApplied.length > 0) {
                rows.push(`| ✨ Quality | ${qualityLabelsApplied.map(l => `\`${l}\``).join(', ')} ${qualityPointsBonus} |`);
              }

              if (rows.length > 0) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: prNum,
                  body: [
                    `## 🤖 Auto-Label Summary`,
                    ``,
                    `Labels have been automatically detected and applied to this PR:`,
                    ``,
                    `| Category | Label(s) |`,
                    `|----------|----------|`,
                    ...rows,
                    ``,
                    `> 💡 A maintainer may adjust these labels. **Type** and **quality** labels affect GSSoC'26 scoring.`,
                    ``,
                    `_GSSoC'26 automation · Mentor: [@Ayushh-Sharmaa](https://github.com/Ayushh-Sharmaa)_`,
                  ].join('\n'),
                });
                console.log(`💬 Label summary comment posted on PR #${prNum}`);
              }
            }
