name: GSSoC — Level:Advanced Label Handler

# ─────────────────────────────────────────────────────────────────────────────
# Fires whenever `level:advanced` is manually applied to an issue OR a PR.
# Adds a contextual comment explaining what the label means.
# ─────────────────────────────────────────────────────────────────────────────
on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]

jobs:
  handle-advanced:
    name: Handle level:advanced Label
    runs-on: ubuntu-latest
    if: github.event.label.name == 'level:advanced'
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Comment on advanced-level issue / PR
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const isPR  = !!context.payload.pull_request;
            const item  = isPR ? context.payload.pull_request : context.payload.issue;
            const num   = item.number;
            const actor = item.user.login;
            const { owner, repo } = context.repo;

            const body = [
              `## 🔴 Advanced Level — \`level:advanced\``,
              ``,
              `Hey @${actor}! 👋  This ${isPR ? 'PR' : 'issue'} has been tagged as **Advanced** difficulty.`,
              ``,
              `| 🎯 Points | 📌 Effort | 💡 Who should tackle it |`,
              `|-----------|-----------|--------------------------|`,
              `| **45 pts** | High — cross-cutting changes, complex logic, or performance work | Experienced contributors |`,
              ``,
              `**What this means:**`,
              `- Deep understanding of the codebase is required`,
              `- Expect to touch 8–15 files or build a substantial feature`,
              `- Proficiency in the full stack (TypeScript, React, APIs, CSS architecture) required`,
              `- Thorough testing & documentation is expected with this PR`,
              ``,
              `${isPR ? '> 🔍 Mentor @Ayushh-Sharmaa will conduct a detailed review. Please ensure all tests pass.' : '> 👉 This issue requires an experienced contributor. Please share your relevant experience when requesting assignment.'}`,
              ``,
              `_Labelled by GSSoC automation · Mentor: [@Ayushh-Sharmaa](https://github.com/Ayushh-Sharmaa)_`,
            ].join('\n');

            await github.rest.issues.createComment({ owner, repo, issue_number: num, body });
            console.log(`💬 Commented level:advanced info on ${isPR ? 'PR' : 'issue'} #${num}`);
