name: GSSoC — Auto Label on Merge

# ─────────────────────────────────────────────────────────────────────────────
# Runs when a PR is MERGED (not just closed).
# • Applies gssoc:approved to the PR (if not spam/invalid)
# • Applies gssoc:approved + level label to the LINKED ISSUE
# • Confirms or corrects the difficulty level label on PR
# • Adds mentor:Ayushh-Sharmaa attribution
# ─────────────────────────────────────────────────────────────────────────────
on:
  pull_request_target:
    types: [closed]

jobs:
  label-on-merge:
    name: Apply GSSoC Labels on PR Merge
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Apply gssoc:approved and update linked issues
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr    = context.payload.pull_request;
            const prNum = pr.number;

            // ── Ensure all labels exist ───────────────────────────────────────
            const allLabels = [
              { name: 'level:beginner',        color: '0075ca', description: 'Suitable for beginners (10 pts)' },
              { name: 'level:intermediate',    color: 'e4e669', description: 'Requires intermediate experience (25 pts)' },
              { name: 'level:advanced',        color: 'e11d48', description: 'Requires advanced expertise (45 pts)' },
              { name: 'level:critical',        color: '7c3aed', description: 'Critical/complex issue (60 pts)' },
              { name: 'quality:clean',         color: '22c55e', description: 'GSSoC: Clean, well-written code' },
              { name: 'quality:exceptional',   color: 'f59e0b', description: 'GSSoC: Exceptional quality (+bonus pts)' },
              { name: 'type:docs',             color: '0ea5e9', description: 'GSSoC: Documentation contribution' },
              { name: 'type:testing',          color: '0ea5e9', description: 'GSSoC: Testing contribution' },
              { name: 'type:accessibility',    color: '0ea5e9', description: 'GSSoC: Accessibility improvement' },
              { name: 'type:performance',      color: '0ea5e9', description: 'GSSoC: Performance improvement' },
              { name: 'type:security',         color: 'b91c1c', description: 'GSSoC: Security-related contribution' },
              { name: 'type:design',           color: 'a855f7', description: 'GSSoC: Design / UI contribution' },
              { name: 'type:refactor',         color: '64748b', description: 'GSSoC: Code refactoring' },
              { name: 'type:devops',           color: 'f97316', description: 'GSSoC: DevOps / CI-CD contribution' },
              { name: 'type:bug',              color: 'd73a4a', description: 'GSSoC: Bug fix' },
              { name: 'type:feature',          color: '84cc16', description: 'GSSoC: New feature' },
              { name: 'gssoc:approved',        color: '0e8a16', description: 'GSSoC: Approved and scored contribution' },
              { name: 'gssoc:invalid',         color: 'ee0701', description: 'GSSoC: Invalid contribution' },
              { name: 'gssoc:spam',            color: 'ee0701', description: 'GSSoC: Spam contribution' },
              { name: 'gssoc:ai-slop',         color: 'b60205', description: 'GSSoC: AI-generated low-quality contribution' },
              { name: 'mentor:Ayushh-Sharmaa', color: '6f42c1', description: 'GSSoC: Mentor attribution for @Ayushh-Sharmaa' },
              { name: "GSSoC'26",              color: '0e8a16', description: 'Part of GirlScript Summer of Code 2026' },
            ];

            for (const label of allLabels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch (e) {
                if (e.status === 404) await github.rest.issues.createLabel({ owner, repo, ...label });
              }
            }

            // ── Get current PR labels ────────────────────────────────────────
            const { data: current } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNum,
            });
            const labelNames = current.map(l => l.name);

            // ── Determine spam/invalid status ────────────────────────────────
            const badLabels = ['gssoc:spam', 'gssoc:invalid', 'gssoc:ai-slop', 'do-not-merge'];
            const isSpam    = badLabels.some(l => labelNames.includes(l));

            // ── Determine difficulty level from PR size ───────────────────────
            const additions    = pr.additions    || 0;
            const deletions    = pr.deletions    || 0;
            const changedFiles = pr.changed_files || 0;
            const totalChanges = additions + deletions;

            let level = 'level:beginner';
            if      (totalChanges > 500 || changedFiles > 15) level = 'level:critical';
            else if (totalChanges > 200 || changedFiles > 8)  level = 'level:advanced';
            else if (totalChanges > 50  || changedFiles > 3)  level = 'level:intermediate';

            // ── Apply labels to the PR ────────────────────────────────────────
            if (!isSpam && !labelNames.includes('gssoc:approved')) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: prNum, labels: ['gssoc:approved'] });
              console.log(`✅ Applied gssoc:approved to PR #${prNum}`);
            } else if (isSpam) {
              console.log(`⚠️  Skipping gssoc:approved — PR #${prNum} is spam/invalid.`);
            }

            const hasLevel = labelNames.some(n => n.startsWith('level:'));
            if (!hasLevel) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: prNum, labels: [level] });
              console.log(`📊 Applied ${level} to PR #${prNum}`);
            } else {
              // Use the level already on the PR
              level = labelNames.find(n => n.startsWith('level:')) || level;
            }

            if (!labelNames.includes('mentor:Ayushh-Sharmaa')) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: prNum, labels: ['mentor:Ayushh-Sharmaa'],
              });
              console.log(`🎓 Applied mentor:Ayushh-Sharmaa to PR #${prNum}`);
            }

            // ── Find linked issues from PR body ───────────────────────────────
            // Matches: closes/fixes/resolves #123 (case-insensitive)
            const body = pr.body || '';
            const linkedPattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const linkedIssues  = [];
            let match;
            while ((match = linkedPattern.exec(body)) !== null) {
              linkedIssues.push(parseInt(match[1], 10));
            }
            // Also catch plain "#123" references
            const plainPattern = /#(\d+)/g;
            while ((match = plainPattern.exec(body)) !== null) {
              const num = parseInt(match[1], 10);
              if (!linkedIssues.includes(num)) linkedIssues.push(num);
            }

            console.log(`🔗 Linked issues found: ${linkedIssues.length > 0 ? linkedIssues.join(', ') : 'none'}`);

            // ── Update each linked issue ──────────────────────────────────────
            for (const issueNum of linkedIssues) {
              try {
                // Verify the issue exists and is an issue (not a PR)
                const { data: issueData } = await github.rest.issues.get({
                  owner, repo, issue_number: issueNum,
                });
                if (issueData.pull_request) {
                  console.log(`⏭️  #${issueNum} is a PR, skipping.`);
                  continue;
                }

                const { data: issueLabels } = await github.rest.issues.listLabelsOnIssue({
                  owner, repo, issue_number: issueNum,
                });
                const issueLabelNames = issueLabels.map(l => l.name);
                const issueLabelsToAdd = [];

                // Apply gssoc:approved unless spam
                if (!isSpam && !issueLabelNames.includes('gssoc:approved')) {
                  issueLabelsToAdd.push('gssoc:approved');
                }

                // Sync level label — remove old, add correct
                const hasIssueLevel = issueLabelNames.some(n => n.startsWith('level:'));
                if (!hasIssueLevel) {
                  issueLabelsToAdd.push(level);
                } else {
                  // If issue has a level but it differs from PR level, update it
                  const issueLevel = issueLabelNames.find(n => n.startsWith('level:'));
                  if (issueLevel !== level) {
                    await github.rest.issues.removeLabel({
                      owner, repo, issue_number: issueNum, name: issueLevel,
                    });
                    issueLabelsToAdd.push(level);
                    console.log(`🔄 Updated issue #${issueNum} level: ${issueLevel} → ${level}`);
                  }
                }

                // Propagate type labels from PR to issue
                const typeLabels = labelNames.filter(n => n.startsWith('type:'));
                for (const tl of typeLabels) {
                  if (!issueLabelNames.includes(tl)) issueLabelsToAdd.push(tl);
                }

                // Mentor label
                if (!issueLabelNames.includes('mentor:Ayushh-Sharmaa')) {
                  issueLabelsToAdd.push('mentor:Ayushh-Sharmaa');
                }

                if (issueLabelsToAdd.length > 0) {
                  await github.rest.issues.addLabels({
                    owner, repo, issue_number: issueNum, labels: issueLabelsToAdd,
                  });
                  console.log(`🏷️  Applied [${issueLabelsToAdd.join(', ')}] to issue #${issueNum}`);
                }

                // Comment on the linked issue
                if (!isSpam) {
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: issueNum,
                    body: [
                      `## ✅ Issue Resolved via PR #${prNum}`,
                      ``,
                      `This issue has been resolved and the corresponding PR has been **merged**! 🎉`,
                      ``,
                      `| Field | Value |`,
                      `|-------|-------|`,
                      `| 🔀 Merged PR | #${prNum} |`,
                      `| 🎯 Difficulty | \`${level}\` |`,
                      `| 🏆 Status | \`gssoc:approved\` |`,
                      `| 🎓 Mentor | [@Ayushh-Sharmaa](https://github.com/Ayushh-Sharmaa) |`,
                      ``,
                      `_GSSoC'26 automation · Mentor: [@Ayushh-Sharmaa](https://github.com/Ayushh-Sharmaa)_`,
                    ].join('\n'),
                  });
                  console.log(`💬 Merge comment posted on issue #${issueNum}`);
                }
              } catch (err) {
                console.log(`⚠️  Could not process issue #${issueNum}: ${err.message}`);
              }
            }

            console.log(`✅ Merge labelling complete for PR #${prNum}`);
