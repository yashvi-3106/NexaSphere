name: Auto-Assign PR Author

# ─────────────────────────────────────────────────────────────────────────────
# When a pull request is opened or re-opened, automatically assign the PR
# author to that pull request. Bots are excluded.
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  assign-pr-author:
    name: Assign PR to its author
    runs-on: ubuntu-latest

    # Skip bots
    if: "!contains(github.event.pull_request.user.login, '[bot]')"

    steps:
      - name: Assign PR author to the pull request
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const author   = context.payload.pull_request.user.login;

            // Check if already assigned (e.g. on re-open)
            const currentAssignees = context.payload.pull_request.assignees.map(a => a.login);
            if (currentAssignees.includes(author)) {
              console.log(`ℹ️  @${author} is already assigned to PR #${prNumber} — skipping`);
              return;
            }

            await github.rest.issues.addAssignees({
              owner, repo,
              issue_number: prNumber,   // GitHub API uses issue_number for PRs too
              assignees: [author],
            });

            console.log(`✅ @${author} auto-assigned to PR #${prNumber}`);
