name: Lighthouse CI

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Upgrade npm to v11 (matches lockfile generator)
        run: npm install -g npm@11

      - name: Install monorepo dependencies
        run: npm install --legacy-peer-deps

      - name: Build the website
        run: npm run build --workspace=website

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.13.x
          cd website
          lhci autorun
        env:
          # Optional: set LHCI_GITHUB_APP_TOKEN in repo secrets to enable
          # GitHub status checks from Lighthouse CI. Runs fine without it.
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
