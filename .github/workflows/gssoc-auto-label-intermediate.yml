name: GSSoC — Level:Intermediate Label Handler

# ─────────────────────────────────────────────────────────────────────────────
# Fires whenever `level:intermediate` is manually applied to an issue OR a PR.
# Adds a contextual comment explaining what the label means.
# ─────────────────────────────────────────────────────────────────────────────
on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]

jobs:
  handle-intermediate:
    name: Handle level:intermediate Label
    runs-on: ubuntu-latest
    if: github.event.label.name == 'level:intermediate'
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Comment on intermediate-level issue / PR
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const isPR  = !!context.payload.pull_request;
            const item  = isPR ? context.payload.pull_request : context.payload.issue;
            const num   = item.number;
            const actor = item.user.login;
            const { owner, repo } = context.repo;

            const body = [
              `## 🟨 Intermediate Level — \`level:intermediate\``,
              ``,
              `Hey @${actor}! 👋  This ${isPR ? 'PR' : 'issue'} has been tagged as **Intermediate** difficulty.`,
              ``,
              `| 🎯 Points | 📌 Effort | 💡 Who should tackle it |`,
              `|-----------|-----------|--------------------------|`,
              `| **25 pts** | Medium — component-level changes or multi-file edits | Contributors with some project familiarity |`,
              ``,
              `**What this means:**`,
              `- Requires understanding of the project structure`,
              `- Expect to modify 3–8 files or implement a moderate feature`,
              `- Some knowledge of the tech stack (React / Next.js / CSS) expected`,
              ``,
              `${isPR ? '> 🔍 A mentor will review your PR shortly.' : '> 👉 Comment below to get assigned — make sure you have some open-source experience before picking this up!'}`,
              ``,
              `_Labelled by GSSoC automation · Mentor: [@Ayushh-Sharmaa](https://github.com/Ayushh-Sharmaa)_`,
            ].join('\n');

            await github.rest.issues.createComment({ owner, repo, issue_number: num, body });
            console.log(`💬 Commented level:intermediate info on ${isPR ? 'PR' : 'issue'} #${num}`);
