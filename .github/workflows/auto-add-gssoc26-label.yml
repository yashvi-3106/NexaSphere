name: GSSoC — Auto-Add GSSoC'26 Label to Issues

on:
  issues:
    types:
      - opened

jobs:
  add-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Ensure GSSoC'26 label exists
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labelName = "GSSoC'26";
            const { owner, repo } = context.repo;

            try {
              await github.rest.issues.getLabel({ owner, repo, name: labelName });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: labelName,
                color: '0E8A16',
                description: "Automatically applied to issues for GSSoC'26",
              });
              console.log(`Created label: ${labelName}`);
            }

      - name: Apply GSSoC'26 label to issue
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labelName = "GSSoC'26";
            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue.number;

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: [labelName],
            });
            console.log(`Applied ${labelName} to issue #${issue_number}`);
