name: GSSoC — Duplicate PR Detection

# ─────────────────────────────────────────────────────────────────────────────
# Detects PRs that target the same issue as an already-open PR.
# Warns contributors and adds a duplicate label.
# ─────────────────────────────────────────────────────────────────────────────
on:
  pull_request_target:
    types: [opened, reopened]

concurrency:
  group: duplicate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  detect-duplicate-pr:
    name: Detect Duplicate PRs
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login != 'github-actions[bot]' &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Check for duplicate PRs targeting the same issue
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr    = context.payload.pull_request;
            const prNum = pr.number;
            const body  = pr.body || '';

            // ── Ensure label exists ───────────────────────────────────────────
            try {
              await github.rest.issues.getLabel({ owner, repo, name: 'duplicate-pr' });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner, repo,
                  name: 'duplicate-pr',
                  color: 'cfd3d7',
                  description: 'Duplicate PR — another PR targets the same issue',
                });
              }
            }

            // ── Extract linked issue numbers ──────────────────────────────────
            const pattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s*:?\s*#(\d+)/gi;
            const linked  = [...new Set([...body.matchAll(pattern)].map(m => parseInt(m[1])))];

            if (linked.length === 0) {
              console.log(`⏭️  PR #${prNum} has no linked issues — skipping duplicate check`);
              return;
            }

            // ── Search all other open PRs for the same linked issue ───────────
            const duplicateOf = [];

            for (const issueNum of linked) {
              // Search for other open PRs referencing the same issue
              const { data: results } = await github.rest.search.issuesAndPullRequests({
                q: `repo:${owner}/${repo} is:pr is:open Closes #${issueNum}`,
              });

              for (const item of results.items) {
                if (item.number !== prNum) {
                  duplicateOf.push({ pr: item.number, issue: issueNum, title: item.title });
                }
              }
            }

            if (duplicateOf.length === 0) {
              console.log(`✅ PR #${prNum} — no duplicate PRs found`);
              return;
            }

            // ── Apply label and warn ──────────────────────────────────────────
            await github.rest.issues.addLabels({
              owner, repo, issue_number: prNum, labels: ['duplicate-pr'],
            });

            const dupeList = duplicateOf
              .map(d => `- PR #${d.pr}: **${d.title}** (also targets issue #${d.issue})`)
              .join('\n');

            await github.rest.issues.createComment({
              owner, repo, issue_number: prNum,
              body: [
                `## ⚠️ Possible Duplicate PR`,
                ``,
                `Hey @${pr.user.login}! Another open PR already targets the same linked issue(s):`,
                ``,
                dupeList,
                ``,
                `**Please check the original PR** before proceeding. If the other PR is stale or abandoned, mention it to a maintainer.`,
                ``,
                `If this is NOT a duplicate, a maintainer will remove the \`duplicate-pr\` label.`,
                ``,
                `_GSSoC'26 automation · Mentor: [@Ayushh-Sharmaa](https://github.com/Ayushh-Sharmaa)_`,
              ].join('\n'),
            });
            console.log(`⚠️  PR #${prNum} flagged as possible duplicate of: ${duplicateOf.map(d => `#${d.pr}`).join(', ')}`);
