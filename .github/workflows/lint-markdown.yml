# Markdown Linting Workflow (Issue #832 — Option 1)
# Automatically checks all .md files for formatting consistency on every PR.
name: Lint Markdown

on:
  pull_request:
    branches: [main, master, develop]
    paths:
      - '**.md'
      - '.markdownlint.json'
      - '.github/workflows/lint-markdown.yml'
  push:
    branches: [main]
    paths:
      - '**.md'
      - '.markdownlint.json'

jobs:
  markdownlint:
    name: Markdown — Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          # Lint all markdown files in the repo, excluding generated/vendor dirs
          globs: |
            **/*.md
            !node_modules/**
            !**/node_modules/**
            !website/dist/**
            !admin-dashboard/dist/**
          config: '.markdownlint.json'
