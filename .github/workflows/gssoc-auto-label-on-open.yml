name: GSSoC — Auto-Label Issues & PRs on Open

# ─────────────────────────────────────────────────────────────────────────────
# WHY pull_request_target instead of pull_request?
#
# When a contributor forks the repo and opens a PR, GitHub gives the
# pull_request event a READ-ONLY token — addLabels() silently fails.
# pull_request_target always runs with the BASE REPO's write token,
# so labelling works for every PR including forks.
#
# ✅ Safe here because we NEVER checkout or execute code from the fork.
# ─────────────────────────────────────────────────────────────────────────────
on:
  issues:
    types: [opened, reopened]
  pull_request_target: # ← key fix for fork PRs
    types: [opened, reopened]

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — ISSUES
  # Gets: GSSoC'26 + level:beginner (default) + mentor:Ayushh-Sharmaa
  # ════════════════════════════════════════════════════════════════════════════
  label-issue:
    name: Auto-Label New Issue
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    permissions:
      issues: write

    steps:
      - name: Bootstrap all labels + apply to issue
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const issueNumber     = context.payload.issue.number;
            const author          = context.payload.issue.user.login;

            // ── 1. Ensure every GSSoC label definition exists in the repo ───
            const ALL_LABELS = [
              { name: "level:beginner",       color: "0075ca", description: "GSSoC: Beginner — 10 pts" },
              { name: "level:intermediate",    color: "e4e669", description: "GSSoC: Intermediate — 25 pts" },
              { name: "level:advanced",        color: "e11d48", description: "GSSoC: Advanced — 45 pts" },
              { name: "level:critical",        color: "7c3aed", description: "GSSoC: Critical — 60 pts" },
              { name: "quality:clean",         color: "22c55e", description: "GSSoC: Clean, well-written code" },
              { name: "quality:exceptional",   color: "f59e0b", description: "GSSoC: Exceptional quality (+bonus pts)" },
              { name: "type:docs",             color: "0ea5e9", description: "GSSoC: Documentation contribution" },
              { name: "type:testing",          color: "0ea5e9", description: "GSSoC: Testing contribution" },
              { name: "type:accessibility",    color: "0ea5e9", description: "GSSoC: Accessibility improvement" },
              { name: "type:performance",      color: "0ea5e9", description: "GSSoC: Performance improvement" },
              { name: "type:security",         color: "b91c1c", description: "GSSoC: Security-related contribution" },
              { name: "type:design",           color: "a855f7", description: "GSSoC: Design / UI contribution" },
              { name: "type:refactor",         color: "64748b", description: "GSSoC: Code refactoring" },
              { name: "type:devops",           color: "f97316", description: "GSSoC: DevOps / CI-CD contribution" },
              { name: "type:bug",              color: "d73a4a", description: "GSSoC: Bug fix" },
              { name: "type:feature",          color: "84cc16", description: "GSSoC: New feature" },
              { name: "gssoc:approved",        color: "0e8a16", description: "GSSoC: Approved and scored contribution" },
              { name: "gssoc:invalid",         color: "ee0701", description: "GSSoC: Invalid contribution" },
              { name: "gssoc:spam",            color: "ee0701", description: "GSSoC: Spam contribution" },
              { name: "gssoc:ai-slop",         color: "b60205", description: "GSSoC: AI-generated low-quality contribution" },
              { name: "mentor:Ayushh-Sharmaa", color: "6f42c1", description: "GSSoC: Mentor — @Ayushh-Sharmaa" },
              { name: "GSSoC'26",              color: "0e8a16", description: "Part of GirlScript Summer of Code 2026" },
            ];

            for (const lbl of ALL_LABELS) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: lbl.name });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({ owner, repo, ...lbl });
                  console.log(`✅ Created label: ${lbl.name}`);
                }
              }
            }

            // ── 2. Read labels already on this issue ─────────────────────────
            const { data: existing } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: issueNumber,
            });
            const have = new Set(existing.map(l => l.name));

            // ── 3. Always apply: GSSoC'26 + level:beginner + mentor ──────────
            const toAdd = [];
            if (!have.has("GSSoC'26"))              toAdd.push("GSSoC'26");
            if (![...have].some(n => n.startsWith("level:"))) toAdd.push("level:beginner");
            if (!have.has("mentor:Ayushh-Sharmaa")) toAdd.push("mentor:Ayushh-Sharmaa");

            if (toAdd.length) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: toAdd });
              console.log(`🏷️  Added [${toAdd.join(", ")}] to issue #${issueNumber}`);
            }

            // ── 4. Welcome comment ────────────────────────────────────────────
            await github.rest.issues.createComment({
              owner, repo, issue_number: issueNumber,
              body: [
                `## 👋 Welcome to NexaSphere — GSSoC'26!`,
                ``,
                `Thanks for opening this issue, @${author}! Labels have been auto-applied:`,
                ``,
                `| Label | Value |`,
                `|-------|-------|`,
                `| 🏷️ Program    | \`GSSoC'26\` |`,
                `| 🎯 Difficulty | \`level:beginner\` *(maintainer may adjust)* |`,
                `| 🎓 Mentor     | [@Ayushh-Sharmaa](https://github.com/Ayushh-Sharmaa) |`,
                ``,
                `**A maintainer will triage and may update:**`,
                `- Difficulty → \`level:intermediate\` / \`level:advanced\` / \`level:critical\``,
                `- Type → \`type:bug\` / \`type:feature\` / \`type:docs\` / \`type:design\` / etc.`,
                ``,
                `**Before you start working:**`,
                `1. Wait for triage + validation`,
                `2. Comment *"Can I work on this?"* to request assignment`,
                `3. Get **officially assigned** by a maintainer`,
                `4. Submit your PR with \`Closes #${issueNumber}\` in the description`,
                ``,
                `> ⚠️ PRs submitted without being assigned will be **automatically closed**.`,
                ``,
                `_GSSoC'26 automation · Mentor: [@Ayushh-Sharmaa](https://github.com/Ayushh-Sharmaa)_`,
              ].join("\n"),
            });
            console.log(`💬 Welcome comment posted on issue #${issueNumber}`);

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — PULL REQUESTS
  # Gets: GSSoC'26 + auto-detected level + mentor:Ayushh-Sharmaa
  # ════════════════════════════════════════════════════════════════════════════
  label-pr:
    name: Auto-Label New PR
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.user.login != 'github-actions[bot]' &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Bootstrap all labels + apply to PR
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr     = context.payload.pull_request;
            const prNum  = pr.number;
            const author = pr.user.login;

            // ── 1. Ensure every GSSoC label definition exists in the repo ───
            const ALL_LABELS = [
              { name: "level:beginner",       color: "0075ca", description: "GSSoC: Beginner — 10 pts" },
              { name: "level:intermediate",    color: "e4e669", description: "GSSoC: Intermediate — 25 pts" },
              { name: "level:advanced",        color: "e11d48", description: "GSSoC: Advanced — 45 pts" },
              { name: "level:critical",        color: "7c3aed", description: "GSSoC: Critical — 60 pts" },
              { name: "quality:clean",         color: "22c55e", description: "GSSoC: Clean, well-written code" },
              { name: "quality:exceptional",   color: "f59e0b", description: "GSSoC: Exceptional quality (+bonus pts)" },
              { name: "type:docs",             color: "0ea5e9", description: "GSSoC: Documentation contribution" },
              { name: "type:testing",          color: "0ea5e9", description: "GSSoC: Testing contribution" },
              { name: "type:accessibility",    color: "0ea5e9", description: "GSSoC: Accessibility improvement" },
              { name: "type:performance",      color: "0ea5e9", description: "GSSoC: Performance improvement" },
              { name: "type:security",         color: "b91c1c", description: "GSSoC: Security-related contribution" },
              { name: "type:design",           color: "a855f7", description: "GSSoC: Design / UI contribution" },
              { name: "type:refactor",         color: "64748b", description: "GSSoC: Code refactoring" },
              { name: "type:devops",           color: "f97316", description: "GSSoC: DevOps / CI-CD contribution" },
              { name: "type:bug",              color: "d73a4a", description: "GSSoC: Bug fix" },
              { name: "type:feature",          color: "84cc16", description: "GSSoC: New feature" },
              { name: "gssoc:approved",        color: "0e8a16", description: "GSSoC: Approved and scored contribution" },
              { name: "gssoc:invalid",         color: "ee0701", description: "GSSoC: Invalid contribution" },
              { name: "gssoc:spam",            color: "ee0701", description: "GSSoC: Spam contribution" },
              { name: "gssoc:ai-slop",         color: "b60205", description: "GSSoC: AI-generated low-quality contribution" },
              { name: "mentor:Ayushh-Sharmaa", color: "6f42c1", description: "GSSoC: Mentor — @Ayushh-Sharmaa" },
              { name: "GSSoC'26",              color: "0e8a16", description: "Part of GirlScript Summer of Code 2026" },
            ];

            for (const lbl of ALL_LABELS) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: lbl.name });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({ owner, repo, ...lbl });
                  console.log(`✅ Created label: ${lbl.name}`);
                }
              }
            }

            // ── 2. Read labels already on this PR ────────────────────────────
            const { data: existing } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNum,
            });
            const have = new Set(existing.map(l => l.name));

            // ── 3. Auto-detect difficulty from PR size ────────────────────────
            const additions    = pr.additions    || 0;
            const deletions    = pr.deletions    || 0;
            const changedFiles = pr.changed_files || 0;
            const totalChanges = additions + deletions;

            let autoLevel = "level:beginner";
            if      (totalChanges > 500 || changedFiles > 15) autoLevel = "level:critical";
            else if (totalChanges > 200 || changedFiles > 8)  autoLevel = "level:advanced";
            else if (totalChanges > 50  || changedFiles > 3)  autoLevel = "level:intermediate";

            // ── 4. Always apply: GSSoC'26 + auto-level + mentor ──────────────
            const toAdd = [];
            if (!have.has("GSSoC'26"))              toAdd.push("GSSoC'26");
            if (![...have].some(n => n.startsWith("level:"))) toAdd.push(autoLevel);
            if (!have.has("mentor:Ayushh-Sharmaa")) toAdd.push("mentor:Ayushh-Sharmaa");

            if (toAdd.length) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: prNum, labels: toAdd });
              console.log(`🏷️  Added [${toAdd.join(", ")}] to PR #${prNum}`);
            }

            // ── 5. Welcome comment ────────────────────────────────────────────
            const levelMap = {
              "level:beginner":     "🟦 Beginner — 10 pts",
              "level:intermediate": "🟨 Intermediate — 25 pts",
              "level:advanced":     "🔴 Advanced — 45 pts",
              "level:critical":     "🟣 Critical — 60 pts",
            };
            const isAdmin = (author === "Ayushh-Sharmaa");

            await github.rest.issues.createComment({
              owner, repo, issue_number: prNum,
              body: [
                `## 🚀 GSSoC'26 PR — Thank you, @${author}!`,
                ``,
                `Labels have been automatically applied:`,
                ``,
                `| Label | Applied |`,
                `|-------|---------|`,
                `| 🏷️ Program    | \`GSSoC'26\` |`,
                `| 🎯 Difficulty | \`${autoLevel}\` → ${levelMap[autoLevel]} |`,
                `| 📝 Size       | ${totalChanges} lines · ${changedFiles} file(s) changed |`,
                `| 🎓 Mentor     | [@Ayushh-Sharmaa](https://github.com/Ayushh-Sharmaa) |`,
                ``,
                `**Maintainer will add next:**`,
                `- **Type** → \`type:bug\` / \`type:feature\` / \`type:docs\` / \`type:design\` / etc.`,
                `- **Quality** → \`quality:clean\` / \`quality:exceptional\``,
                `- **Validation** → \`gssoc:approved\` auto-applied on merge`,
                ``,
                isAdmin
                  ? `> 🔑 **Admin PR** — spam check skipped.`
                  : `> ⚠️ Make sure your description includes \`Closes #ISSUE_NUMBER\` and you are **assigned** to that issue — otherwise this PR will be automatically closed.`,
                ``,
                `_GSSoC'26 automation · Mentor: [@Ayushh-Sharmaa](https://github.com/Ayushh-Sharmaa)_`,
              ].join("\n"),
            });
            console.log(`💬 Welcome comment posted on PR #${prNum}`);
