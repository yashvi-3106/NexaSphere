name: Auto-add NSOC'26 label

on:
  issues:
    types:
      - opened

jobs:
  add-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Ensure NSOC'26 label exists
        uses: actions/github-script@v9
        with:
          script: |
            const labelName = "NSOC'26";
            const { owner, repo } = context.repo;

            try {
              await github.rest.issues.getLabel({ owner, repo, name: labelName });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.issues.createLabel({
                owner,
                repo,
                name: labelName,
                color: '0E8A16',
                description: 'Automatically applied to newly opened issues for NSOC\'26',
              });
            }

      - name: Apply NSOC'26 label
        uses: actions/github-script@v9
        with:
          script: |
            const labelName = "NSOC'26";
            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue.number;

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: [labelName],
            });
