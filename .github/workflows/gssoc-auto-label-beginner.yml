name: GSSoC — Level:Beginner Label Handler

# ─────────────────────────────────────────────────────────────────────────────
# Fires whenever `level:beginner` is manually applied to an issue OR a PR.
# Adds a contextual comment explaining what the label means.
# ─────────────────────────────────────────────────────────────────────────────
on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]

jobs:
  handle-beginner:
    name: Handle level:beginner Label
    runs-on: ubuntu-latest
    # Only run when this specific label was added
    if: github.event.label.name == 'level:beginner'
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Comment on beginner-level issue / PR
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const isPR  = !!context.payload.pull_request;
            const item  = isPR ? context.payload.pull_request : context.payload.issue;
            const num   = item.number;
            const actor = item.user.login;
            const { owner, repo } = context.repo;

            const body = [
              `## 🟦 Beginner Level — \`level:beginner\``,
              ``,
              `Hey @${actor}! 👋  This ${isPR ? 'PR' : 'issue'} has been tagged as **Beginner** difficulty.`,
              ``,
              `| 🎯 Points | 📌 Effort | 💡 Who should tackle it |`,
              `|-----------|-----------|--------------------------|`,
              `| **10 pts** | Small — minimal code changes, docs, or typo fixes | Anyone new to open source |`,
              ``,
              `**What this means:**`,
              `- Simple, well-scoped task — a great starting point for first-time contributors`,
              `- Expected effort: a few lines to a small file change`,
              `- No deep domain knowledge required`,
              ``,
              `${isPR ? '> 🔍 A mentor will review your PR shortly.' : '> 👉 Comment below to get assigned and start contributing!'}`,
              ``,
              `_Labelled by GSSoC automation · Mentor: [@Ayushh-Sharmaa](https://github.com/Ayushh-Sharmaa)_`,
            ].join('\n');

            await github.rest.issues.createComment({ owner, repo, issue_number: num, body });
            console.log(`💬 Commented level:beginner info on ${isPR ? 'PR' : 'issue'} #${num}`);
