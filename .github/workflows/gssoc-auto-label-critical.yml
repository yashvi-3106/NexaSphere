name: GSSoC — Level:Critical Label Handler

# ─────────────────────────────────────────────────────────────────────────────
# Fires whenever `level:critical` is manually applied to an issue OR a PR.
# Adds a contextual comment explaining what the label means and pings maintainer.
# ─────────────────────────────────────────────────────────────────────────────
on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]

jobs:
  handle-critical:
    name: Handle level:critical Label
    runs-on: ubuntu-latest
    if: github.event.label.name == 'level:critical'
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Comment on critical-level issue / PR
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const isPR  = !!context.payload.pull_request;
            const item  = isPR ? context.payload.pull_request : context.payload.issue;
            const num   = item.number;
            const actor = item.user.login;
            const { owner, repo } = context.repo;

            const body = [
              `## 🟣 Critical Level — \`level:critical\``,
              ``,
              `Hey @${actor}! 👋  This ${isPR ? 'PR' : 'issue'} has been tagged as **Critical** difficulty.`,
              ``,
              `| 🎯 Points | 📌 Effort | 💡 Who should tackle it |`,
              `|-----------|-----------|--------------------------|`,
              `| **60 pts** | Very High — architecture-level changes, security fixes, or core system overhauls | Senior / expert contributors only |`,
              ``,
              `**What this means:**`,
              `- This task has significant project-wide impact`,
              `- Changes may affect core architecture, security, or performance at scale`,
              `- Expect 15+ files, extensive testing, and documentation`,
              `- Requires sign-off from project maintainer before merge`,
              ``,
              `> ⚠️ **This is a high-priority item.** CC: @Ayushh-Sharmaa — please triage this as soon as possible.`,
              ``,
              `${isPR ? '> 🔒 This PR **must** be reviewed and approved by @Ayushh-Sharmaa before it can be merged.' : '> 🔒 Only assign this to a contributor with proven expertise. Mentor approval required.'}`,
              ``,
              `_Labelled by GSSoC automation · Mentor: [@Ayushh-Sharmaa](https://github.com/Ayushh-Sharmaa)_`,
            ].join('\n');

            await github.rest.issues.createComment({ owner, repo, issue_number: num, body });
            console.log(`💬 Commented level:critical info on ${isPR ? 'PR' : 'issue'} #${num}`);

      # ── For critical PRs: request mandatory maintainer review ────────────────
      - name: Request mandatory review from maintainer on critical PRs
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const maintainer = 'Ayushh-Sharmaa';
            if (pr.user.login === maintainer) {
              console.log('Author IS the maintainer — skipping self-review request.');
              return;
            }
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                pull_number: pr.number,
                reviewers: [maintainer],
              });
              console.log(`🔔 Requested mandatory review from @${maintainer} on critical PR #${pr.number}`);
            } catch (e) {
              console.error(`Could not request review: ${e.message}`);
            }
