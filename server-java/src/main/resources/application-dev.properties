# ─── Dev profile: H2 in-memory, Flyway disabled (JPA handles schema) ───
ADMIN_EMAIL=${ADMIN_EMAIL:admin@nexasphere.org}
ADMIN_PASSWORD=${ADMIN_PASSWORD:Admin@NexaSphere1}
CORS_ORIGIN=http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5001

spring.datasource.url=jdbc:h2:mem:nexaspheredb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console enabled in dev for debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Let JPA create the schema from entities (no Flyway in dev)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable Flyway for local dev — migrations target PostgreSQL only
spring.flyway.enabled=false

server.port=8080

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
