global:
  resolve_timeout: 5m

route:
  receiver: null-receiver
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: critical-receiver
      continue: true
    - match:
        severity: warning
      receiver: warning-receiver
    - match:
        severity: info
      receiver: null-receiver

receivers:
  - name: null-receiver

  # Local dev: alerts are routed here until SLACK_WEBHOOK_URL is configured.
  # Copy alertmanager.prod.yml.example → alertmanager.local.yml and mount it for production.
  - name: warning-receiver
    webhook_configs: []

  - name: critical-receiver
    webhook_configs: []

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']
