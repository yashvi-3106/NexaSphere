name: 'HTTP 5xx Error Spike'
type: frequency
index: nexasphere-logs-*
num_events: 10
timeframe:
  minutes: 5
filter:
  - term:
      level: 'error'
  - range:
      responseTimeMs:
        from: 5000
alert:
  - 'email'
  - 'slack'
email:
  - 'admin@nexasphere.app'
slack_webhook_url: 'https://hooks.slack.com/services/YOUR_WEBHOOK'
alert_text: 'High error rate detected on {0} - {1} errors in 5 minutes'
alert_text_type: alert_text_only
alert_text_args:
  - service
  - num_events
