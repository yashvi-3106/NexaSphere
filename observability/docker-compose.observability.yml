# Observability stack overlay for NexaSphere (#1817)
# Usage: docker compose -f docker-compose.yml -f observability/docker-compose.observability.yml up -d
# Security Note: Ensure GRAFANA_ADMIN_PASSWORD is set in your environment.

services:
  api:
    environment:
      OTEL_ENABLED: 'true'
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces

  python-api:
    environment:
      OTEL_ENABLED: 'true'
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: nexasphere-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - observability
      - default

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: nexasphere-alertmanager
    ports:
      - '9093:9093'
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    restart: unless-stopped
    networks:
      - observability

  grafana:
    image: grafana/grafana:10.4.2
    container_name: nexasphere-grafana
    ports:
      - '3000:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - elasticsearch
      - jaeger
    restart: unless-stopped
    networks:
      - observability

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.2
    container_name: nexasphere-elasticsearch
    ports:
      - '9200:9200'
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: '-Xms512m -Xmx512m'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./elasticsearch/index-templates:/usr/share/elasticsearch/index-templates:ro
      - ./elasticsearch/setup-ilm.sh:/usr/share/elasticsearch/setup-ilm.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9200/_cluster/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - observability

  elasticsearch-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.2
    container_name: nexasphere-elasticsearch-setup
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./elasticsearch/index-templates:/templates:ro
      - ./elasticsearch/setup-ilm.sh:/setup-ilm.sh:ro
    entrypoint: ['/bin/bash', '/setup-ilm.sh']
    networks:
      - observability

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.2
    container_name: nexasphere-logstash
    ports:
      - '5044:5044'
      - '9600:9600'
    volumes:
      - ./logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ../server/logs:/var/log/nexasphere:ro
    environment:
      LS_JAVA_OPTS: '-Xms256m -Xmx256m'
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - observability

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.2
    container_name: nexasphere-kibana
    ports:
      - '5601:5601'
    environment:
      ELASTICSEARCH_HOSTS: 'http://elasticsearch:9200'
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - observability

  kibana-setup:
    image: curlimages/curl:8.7.1
    container_name: nexasphere-kibana-setup
    depends_on:
      - kibana
    volumes:
      - ./kibana/setup-saved-objects.sh:/setup.sh:ro
    entrypoint: ['/bin/sh', '/setup.sh']
    networks:
      - observability

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.2
    container_name: nexasphere-filebeat
    user: root
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../server/logs:/var/log/nexasphere:ro
    depends_on:
      - logstash
    restart: unless-stopped
    networks:
      - observability

  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: nexasphere-jaeger
    ports:
      - '16686:16686'
      - '4317:4317'
      - '4318:4318'
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    restart: unless-stopped
    networks:
      - observability

  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: nexasphere-node-exporter
    ports:
      - '9100:9100'
    restart: unless-stopped
    networks:
      - observability

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: nexasphere-redis-exporter
    ports:
      - '9121:9121'
    environment:
      REDIS_ADDR: 'redis://redis:6379'
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - observability
      - default

  elastalert:
    build: ./elastalert
    container_name: nexasphere-elastalert
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - observability

volumes:
  prometheus_data:
  grafana_data:
  elasticsearch_data:

networks:
  observability:
    name: nexasphere-observability
    driver: bridge
