version: '3.9'

# Local development: runs the Express API + Nginx gateway + Redis.
# Frontend is served by Vite's dev server (npm run dev:website) for HMR support.
#
# Start everything:  docker compose up
# Gateway only:      docker compose up gateway
# Generate SSL cert: cd gateway && bash generate-certs.sh

services:
  # ── Express API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    expose:
      - '8787'
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      PORT: 8787
      REDIS_URL: redis://redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      LOG_FORMAT: json
      METRICS_ENABLED: 'true'
      OTEL_SERVICE_NAME: nexasphere-api
      OTEL_ENABLED: 'false'
      CORS_ORIGIN: 'http://localhost:5175,http://localhost:5001'
    networks:
      - default
      - observability
    volumes:
      - ./server:/app
      - /app/node_modules
    restart: unless-stopped
    deploy:
      replicas: 2
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8787/health']
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Elasticsearch ─────────────────────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.11.1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── API Gateway (Nginx) ──────────────────────────────────────────────────────
  # Handles: SSL termination, rate limiting, request logging, routing to backend.
  # Port 80  → HTTP (redirects to HTTPS)
  # Port 443 → HTTPS (proxies to api:8787)
  gateway:
    image: nginx:1.25-alpine
    container_name: nexasphere-gateway
    ports:
      - '80:80'
      - '443:443'
    volumes:
      # Nginx config (read-only)
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL certificates — generate with: cd gateway && bash generate-certs.sh
      - ./gateway/certs:/etc/nginx/certs:ro
      # Custom JSON error pages
      - ./gateway/errors:/etc/nginx/errors:ro
      # Persist access and error logs to the host for debugging/monitoring
      - ./logs/nginx:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:80/health']
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Python AI API (optional) ─────────────────────────────────────────────────
  python-api:
    profiles: ['python', 'observability']
    build:
      context: ./server-python
      dockerfile: Dockerfile
    expose:
      - '8000'
    environment:
      REDIS_URL: redis://redis:6379/0
      OTEL_SERVICE_NAME: nexasphere-python
      OTEL_ENABLED: 'false'
      LOG_FORMAT: json
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - observability

networks:
  observability:
    name: nexasphere-observability
    driver: bridge

# Redis is used for rate limiting and Socket.IO session sharing.
