version: '3.9'

# Local development: runs the Express API only.
# Frontend is served by Vite's dev server (npm run dev:website) for HMR support.

services:
  # ── Express API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    expose:
      - '8787'
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      PORT: 8787
      REDIS_URL: redis://redis:6379
      LOG_FORMAT: json
      METRICS_ENABLED: 'true'
      OTEL_SERVICE_NAME: nexasphere-api
      OTEL_ENABLED: 'false'
      # Allow requests from the Vite dev servers
      CORS_ORIGIN: 'http://localhost:5175,http://localhost:5001'
    networks:
      - default
      - observability
    volumes:
      # Mount source for hot-reload (override CMD in dev if needed)
      - ./server:/app
      - /app/node_modules
    restart: unless-stopped
    deploy:
      replicas: 2
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8787/health']
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Redis Server ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Gateway (Nginx Proxy) ───────────────────────────────────────────────
  gateway:
    image: nginx:1.25-alpine
    container_name: nexasphere-gateway
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./gateway/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Python AI API (optional, for observability scraping) ────────────────────
  python-api:
    profiles: ['python', 'observability']
    build:
      context: ./server-python
      dockerfile: Dockerfile
    expose:
      - '8000'
    environment:
      REDIS_URL: redis://redis:6379/0
      OTEL_SERVICE_NAME: nexasphere-python
      OTEL_ENABLED: 'false'
      LOG_FORMAT: json
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - observability

networks:
  observability:
    name: nexasphere-observability
    driver: bridge

# Redis is used for rate limiting and Socket.IO session sharing.
