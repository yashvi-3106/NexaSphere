version: '3.9'

# Local development: runs the Express API only.
# Frontend is served by Vite's dev server (npm run dev:website) for HMR support.

services:
  # ── Express API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    ports:
      - '8787:8787'
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      PORT: 8787
      # Allow requests from the Vite dev servers
      CORS_ORIGIN: 'http://localhost:5175,http://localhost:5001'
    volumes:
      # Mount source for hot-reload (override CMD in dev if needed)
      - ./server:/app
      - /app/node_modules
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8787/health']
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── API Gateway (Nginx Proxy) ───────────────────────────────────────────────
  gateway:
    image: nginx:1.25-alpine
    container_name: nexasphere-gateway
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./gateway/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

# NOTE: Redis is NOT included — rate limiting uses in-memory store.
# Add Redis here if you configure Upstash-compatible Redis in .env.
